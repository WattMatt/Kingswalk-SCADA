name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
  CSRF_SECRET: ${{ secrets.CSRF_SECRET || 'bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb' }}

jobs:
  api-lint-type:
    name: API — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: mypy app

  api-test:
    name: API — Tests
    runs-on: ubuntu-latest
    needs: api-lint-type
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: scada
          POSTGRES_PASSWORD: scada_dev
          POSTGRES_DB: kingswalk_scada_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql+asyncpg://scada:scada_dev@localhost:5432/kingswalk_scada_test"
      # conftest.py reads TEST_DB_URL (defaults to port 5433 for local dev); CI uses port 5432
      TEST_DB_URL: "postgresql+asyncpg://scada:scada_dev@localhost:5432/kingswalk_scada_test"
      # Fallback is a valid base64-encoded 32-byte key — safe for CI, never for production
      MFA_ENCRYPTION_KEY: ${{ secrets.MFA_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run migrations
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=scada_dev psql -h localhost -U scada -d kingswalk_scada_test \
            -f ../db/migrations/0001_initial.sql
          PGPASSWORD=scada_dev psql -h localhost -U scada -d kingswalk_scada_test \
            -f ../db/migrations/0001a_schema_review_fixes.sql
          PGPASSWORD=scada_dev psql -h localhost -U scada -d kingswalk_scada_test \
            -f ../db/migrations/0002_canvas_layers.sql
      - name: Run full test suite
        run: pytest tests/ -v --tb=short

  web-lint-type:
    name: Web — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  web-build:
    name: Web — Build
    runs-on: ubuntu-latest
    needs: web-lint-type
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1
